# Extensions configuration for Heart Portal
# Extensions are external MCP servers that can be hot-reloaded

[extensions.example-calculator]
description = "Simple calculator extension"
command = ["python3", "-m", "http.server", "8080"]  # Placeholder command
working_dir = "extensions/calculator"
auto_start = false
startup_timeout = 30
restart_on_crash = true

[extensions.example-calculator.env]
PYTHONPATH = "/usr/local/lib/python3.9/site-packages"
DEBUG = "1"

[extensions.file-watcher]
description = "File system watcher extension"
command = ["node", "watcher.js"]
working_dir = "extensions/watcher"
auto_start = true
startup_timeout = 15
restart_on_crash = true

[extensions.file-watcher.env]
NODE_ENV = "production"